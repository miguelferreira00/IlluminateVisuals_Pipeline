# ── Servidor ──────────────────────────────────────────────────────
server.port=8080

# ── Base de dados ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/crm_agencia?useSSL=false&serverTimezone=Europe/Lisbon&allowPublicKeyRetrieval=true
spring.datasource.username=crm_user
spring.datasource.password=crm_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Login ADMIN ───────────────────────────────────────────────────
app.admin.password=admin123

# ── Logs ──────────────────────────────────────────────────────────
logging.level.pt.agencia.crm=DEBUG
logging.level.org.springframework.security=INFO
