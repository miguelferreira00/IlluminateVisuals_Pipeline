# ── Servidor ──────────────────────────────────────────────────────
server.port=${PORT:8082}

# ── Base de dados ─────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/crm_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:crm_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:crm_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── CORS (para frontend em Cloudflare) ─────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAMESITE:Lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

# ── Login ADMIN ───────────────────────────────────────────────────
app.admin.password=${ADMIN_PASSWORD:admin123}

# ── Google Calendar OAuth2 ────────────────────────────────────────
google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8082/api/google/callback}
google.frontend-url=${GOOGLE_FRONTEND_URL:http://localhost:4200}

# ── Logs ──────────────────────────────────────────────────────────
logging.level.pt.agencia.crm=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
