# ── Servidor ──────────────────────────────────────────────────────
server.port=${PORT:8082}

# ── Base de dados ─────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:${MYSQL_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3307}/${MYSQLDATABASE:crm_agencia}?useSSL=false&serverTimezone=Europe/Lisbon&allowPublicKeyRetrieval=true}}
spring.datasource.username=${DATABASE_USER:${MYSQLUSER:crm_user}}
spring.datasource.password=${DATABASE_PASSWORD:${MYSQLPASSWORD:crm_pass}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── CORS (para frontend em Cloudflare) ─────────────────────────────
server.servlet.context-path=/api
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

# ── Login ADMIN ───────────────────────────────────────────────────
app.admin.password=${ADMIN_PASSWORD:admin123}

# ── Logs ──────────────────────────────────────────────────────────
logging.level.pt.agencia.crm=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
