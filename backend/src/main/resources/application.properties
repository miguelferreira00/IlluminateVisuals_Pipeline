# ── Servidor ──────────────────────────────────────────────────────
server.port=8080

# ── Base de dados ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/crm_agencia?useSSL=false&serverTimezone=Europe/Lisbon&allowPublicKeyRetrieval=true
spring.datasource.username=crm_user
spring.datasource.password=crm_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── OAuth2 Google (preencher com credenciais do Google Cloud) ──────
spring.security.oauth2.client.registration.google.client-id=GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/calendar
# access_type=offline + prompt=consent garante que o Google devolve refresh token
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth?access_type=offline&prompt=consent

# ── Login ADMIN ───────────────────────────────────────────────────
# Muda este valor para a palavra-passe que quiseres usar
app.admin.password=admin123

# ── Logs ──────────────────────────────────────────────────────────
logging.level.pt.agencia.crm=DEBUG
logging.level.org.springframework.security=INFO
